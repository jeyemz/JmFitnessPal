# Example nginx config for production. Serve the built frontend and proxy /api to the Flask backend.
# Replace suario.divinelifememorialpark.com with your domain and adjust paths.

server {
    listen 80;
    server_name suario.divinelifememorialpark.com;

    root /var/www/jmfitnesspal/dist;   # npm run build output
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
